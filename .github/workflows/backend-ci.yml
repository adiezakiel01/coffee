name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: coffee
          POSTGRES_PASSWORD: coffee
          POSTGRES_DB: coffee-tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test database
        env:
          PGPASSWORD: coffee
        run: psql -h localhost -U coffee -d coffee_tracker -c "CREATE DATABASE coffee_tracker_test;"

      - name: Lint with ruff
        run: ruff check .

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://coffee:coffee@localhost:5432/coffee_tracker
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://coffee:coffee@localhost:5432/coffee_tracker
        run: pytest -v
