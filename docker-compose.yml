services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coffee
      POSTGRES_PASSWORD: coffee
      POSTGRES_DB: coffee_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coffee"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: